      <stop offset="1" stop-color="#CBDDEF"/>
    </linearGradient>
    <linearGradient id="hillA" x1="960" y1="430" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C99BD"/>
