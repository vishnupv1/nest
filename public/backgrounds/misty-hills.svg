<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Misty Hilly Landscape Background</title>
  <desc id="desc">Layered vector hills with fog for a serene Wayanad-inspired atmosphere.</desc>

  <defs>
